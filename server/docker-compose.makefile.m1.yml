services:
  elasticsearch:
    image: "sofadevelopment/sofa-elasticsearch:8.9.0"
    platform: linux/arm64/v8
    restart: 'no'
    container_name: sofa-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    extends:
        file: build/docker-compose.common.yml
        service: elasticsearch
